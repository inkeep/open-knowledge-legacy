# Lima VM config for a Claude Code sandbox.
# Uses Apple's Virtualization.framework (vz driver) — same hypervisor tech as
# Apple Container / OrbStack, but managed via Lima's mature CLI.
#
# Create:  limactl create --name claude-sandbox sandbox-recipes/tier1-lima-vz/claude-sandbox.yaml
# Start:   limactl start claude-sandbox
# Enter:   limactl shell claude-sandbox

vmType: vz
os: Linux
arch: aarch64

cpus: 4
memory: "4GiB"
disk: "20GiB"

images:
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2"
    arch: "aarch64"

# Mount strategy:
#   - $HOME is mounted read-only so the VM can see your repos but can't touch them.
#     To work on a repo, clone it INSIDE the VM under /home/<user>.linux — avoids
#     the 3x hypervisor-boundary FS overhead for metadata-heavy ops (per Infralovers).
#   - /tmp is writable inside the VM only — not shared.
mounts:
  - location: "~"
    writable: false
  - location: "/tmp/lima"
    writable: true

mountType: "virtiofs"

# Enable Rosetta for any x86_64 tools you might need (rare for Claude Code)
rosetta:
  enabled: false
  binfmt: false

# SSH is disabled for mounts, but Lima's internal ssh is how `limactl shell` works
ssh:
  localPort: 0
  loadDotSSHPubKeys: false

# Provisioning: install Node.js and Claude Code on first boot
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends \
        ca-certificates curl git jq sudo \
        iptables ipset bubblewrap socat \
        dnsutils
      # Node.js 22
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      # Claude Code
      npm install -g @anthropic-ai/claude-code @anthropic-ai/sandbox-runtime
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      # Pre-create ~/.claude so host can bind-mount into it later if desired
      mkdir -p ~/.claude

# Lima v2.0 MCP server for AI-agent tool interception (optional but recommended)
# See https://lima-vm.io/docs/examples/ai/
# This exposes glob, list_directory, read_file, run_shell_command, search_file_content, write_file
# to agents on the host that want to route tool calls through the VM.
# Enable via: limactl mcp install claude-sandbox
