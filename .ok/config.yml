# Open Knowledge — project configuration
#
# This file overrides built-in defaults for this project. Every key below
# is commented out and shows its current default value. Uncomment any key
# to override it.
#
# Precedence (lowest -> highest):
#   Built-in defaults
#     -> ~/.ok/config.yml         (user defaults)
#     -> ./.ok/config.yml         (this file)
#
# Schema reference: packages/cli/src/config/schema.ts

# --- Content ---------------------------------------------------------------
# dir: where the CRDT editor reads/writes documents. Relative to the project
# root (the directory containing .ok/), NOT to this file.
#
# Path exclusions live in .okignore (gitignore syntax) at the project root,
# with nested .okignore files honored at any folder depth.
#
# content:
#   dir: .

# --- Persistence -----------------------------------------------------------
# How aggressively CRDT updates are flushed to disk.
# persistence:
#   debounceMs: 2000
#   maxDebounceMs: 10000

# --- Folders: per-folder frontmatter defaults -------------------------------
#
# Folder defaults now live in nested `<folder>/.ok/frontmatter.yml` files —
# sparse, opt-in, lazy-create, auto-clean. Edit via the `set_folder_rule`
# MCP tool or by hand. Spec:
# specs/2026-05-01-folder-level-metadata-and-templates/SPEC.md (D1, FR8)
