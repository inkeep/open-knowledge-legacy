# Open Knowledge — project configuration
#
# This file overrides built-in defaults for this project. Every key below
# is commented out and shows its current default value. Uncomment any key
# to override it.
#
# Precedence (lowest -> highest):
#   Built-in defaults
#     -> ~/.ok/config.yml         (user defaults)
#     -> ./.ok/config.yml         (this file)
#
# Schema reference: packages/cli/src/config/schema.ts

# --- Content ---------------------------------------------------------------
# dir: where the CRDT editor reads/writes documents. Relative to the project
# root (the directory containing .ok/), NOT to this file.
#
# include/exclude: glob patterns for tracked content files. Relative to the
# project root.
#
# content:
#   dir: .
#   include:
#     - "**/*.md"
#   exclude: []

# --- Persistence -----------------------------------------------------------
# How aggressively CRDT updates are flushed to disk.
# persistence:
#   debounceMs: 2000
#   maxDebounceMs: 10000

# --- Folders: per-folder frontmatter defaults -------------------------------
#
# TL;DR glob gotcha: `**` is ONLY a multi-segment wildcard when it is a
# standalone path segment. `foo-**` behaves like `foo-*` (single segment, NOT
# descendants). Use `foo/**` or `foo-*/**` to match descendants.
#
# Rules apply in declaration order (general first, specific last).
# Scalars: last-match wins. Tags: concat across all matching rules + file
# tags last, first-occurrence preserved on dedup. File frontmatter wins
# per-scalar.
folders:
  - match: "specs/**"
    frontmatter:
      title: Specifications
      description: Product + technical specs — scoping, decisions, and implementation plans.
      tags: [ spec ]

  - match: "reports/**"
    frontmatter:
      title: Research Reports
      description: Prior-art research on tech stack, architecture, competitive
        landscape, and related topics.
      tags: [ report ]

  - match: "stories/**"
    frontmatter:
      title: User Stories
      description: Story-level breakdowns of in-flight work — SCR framing and
        acceptance criteria.
      tags: [ story ]

  - match: "projects/**"
    frontmatter:
      title: Projects
      description: Strategic bets — shaped product directions decomposed into
        spec-able work.
      tags: [ project ]

  - match: "tech-probes/**"
    frontmatter:
      title: Tech Probes
      description: Small technical experiments that ground architectural decisions
        with real data.
      tags: [ probe ]

  # Per-subtree overrides — showcase the last-match semantics.
  - match: "specs/*/evidence/**"
    frontmatter:
      description: Spec-local evidence — code traces, dependency checks, captured prior art.
      tags: [ evidence ]

  - match: "specs/*/meta/**"
    frontmatter:
      description: Spec metadata — session changelog, audit findings, design-challenge
        trail.
      tags: [ meta ]

  - match: "reports/*/evidence/**"
    frontmatter:
      description: Report evidence — primary-source snippets and citations.
      tags: [ evidence ]
