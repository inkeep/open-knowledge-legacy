<!doctype html>
<html lang="en">

<head>
  <meta name="color-scheme" content="light dark" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Open Knowledge</title>
  <script>
    (() => {
      let mode = 'wysiwyg';
      try {
        const raw = localStorage.getItem('ok-editor-mode-v1');
        if (raw === 'wysiwyg' || raw === 'source') mode = raw;
      } catch {
        // localStorage unavailable (privacy mode, quota, etc.) — fall through to default
      }
      window.__OK_EDITOR_MODE__ = mode;
    })();
  </script>
</head>

<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
