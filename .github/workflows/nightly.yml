name: Nightly deep tests

# Tier 2 per SPEC §6 R9 (US-016). Runs the fuzz + stress + perf regression gate
# + parse-health gate that the PR-time `ci.yml` (tier 1) does not. Budget: 30 min
# total per job (see calibration note in turbo.json top-of-file comment).

on:
  # On-demand only. The scheduled trigger was retired while this project is
  # pre-production — nobody is on-call for nightly signal and automated
  # compute has no consumer. Tier 1 (`ci.yml`) catches regressions at merge
  # time via the 200-seed fuzz + full stress + fidelity gates. Developers
  # who want to stress-test a risky change run this workflow from the
  # GitHub Actions UI ("Run workflow" button on the Nightly deep tests
  # page), or via `gh workflow run nightly.yml`. If the project reaches a
  # stage where background regression detection is load-bearing, re-enable
  # the `schedule:` trigger with a calibrated off-minute cron.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deep-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-deep-fuzz-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-deep-fuzz-
      - run: bun install --frozen-lockfile
      - env:
          STRESS_FUZZ_NIGHTLY: "1"
        run: bunx turbo run test:fuzz:bridge

  # NOTE: `test:fuzz:bridge` is intentionally not in this matrix.
  # Tier-1 `ci.yml` already runs it at default seeds on every PR/push, and
  # `deep-fuzz` (above) runs the elevated-seed variant via
  # `STRESS_FUZZ_NIGHTLY=1`. Re-running the default-seed variant here
  # would duplicate the tier-1 job without adding variance coverage.
  full-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard:
          - test:stress:server-authoritative
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.shard }}-
      - run: bun install --frozen-lockfile
      - run: bunx turbo run ${{ matrix.shard }}

  # Tier-2 regression gates (R4 perf + R19 parse-health + US-015
  # parseWithFallback 5× bound). These gates are defined in `packages/core/`
  # but are not part of `bun run check` — so without an explicit nightly job
  # they would never run in CI. Matrix covers the three independent gate
  # targets; any single failure fails nightly but does not cascade.
  #
  # RUN_BENCH=1 is set at the job level. The perf:regression and perf:fallback
  # tasks require it to unlock their measured runs; test:health ignores it
  # (no consumer in the parse-health code path) — harmless to set uniformly.
  tier2-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        task:
          - test:perf:regression
          - test:health
          - test:perf:fallback
          - test:perf:r15-guard
          # Component Blocks v2 tier-2 gates. `test:perf` is a Bun perf suite
          # for the γ serialization path; `test:a11y` runs structural
          # accessibility assertions (role, aria-*, focus order) via
          # Playwright. `test:visual` is NOT listed here — it requires
          # committed screenshot baselines (see
          # packages/app/playwright.visual.config.ts `updateSnapshots:
          # 'none'`) and is run manually via
          # `bun run --cwd packages/app test:visual:update` to refresh
          # baselines in a reviewable PR, then
          # `bun run --cwd packages/app test:visual` for verification.
          - test:perf
          - test:a11y
    env:
      RUN_BENCH: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
      - run: bun install --frozen-lockfile
      # Playwright browsers must be installed for the a11y suite. The perf
      # tasks don't use them — skip the install step to save ~1 min on those
      # shards.
      - if: matrix.task == 'test:a11y'
        run: bunx playwright install --with-deps chromium
      - run: bunx turbo run ${{ matrix.task }}
