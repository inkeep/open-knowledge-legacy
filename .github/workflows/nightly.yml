name: Nightly deep tests

on:
  schedule:
    # 6:17 AM UTC daily (off-minute to avoid GHA scheduling contention)
    - cron: "17 6 * * *"
  workflow_dispatch: {} # manual trigger via GitHub Actions UI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deep-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - run: bun install --frozen-lockfile
      - env:
          STRESS_FUZZ_NIGHTLY: "1"
        run: bunx turbo run test:fuzz

  full-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard:
          - test:stress:s1-s8-s9
          - test:stress:s2
          - test:stress:s4
          - test:stress:s5-s6
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - run: bun install --frozen-lockfile
      - run: bunx turbo run ${{ matrix.shard }}
