name: Nightly deep tests

# Tier 2 per SPEC §6 R9 (US-016). Runs the perf regression gate, parse-health
# gate, `parseWithFallback` perf bound, and R15 guard that the PR-time
# `ci.yml` (tier 1) does not. Budget: 30 min total per job.
#
# Bridge-convergence deep fuzz and full stress were removed on 2026-04-19 per
# `specs/2026-04-19-ci-signal-quality/SPEC.md` (FR-2/FR-3). Those signals
# sampled the dual-CRDT architectural residual race; the spec explicitly
# accepts that residual-rate detection is ad-hoc-only (NG6) via
# `bun run measure:fuzz` / `measure:stress`. See AGENTS.md §Measurement
# scripts for the invocation convention.

on:
  # On-demand only. The scheduled trigger was retired while this project is
  # pre-production — nobody is on-call for nightly signal and automated
  # compute has no consumer. Tier 1 (`ci.yml`) catches regressions at merge
  # time via the deterministic fidelity + integration + conversion suites.
  # Developers run this workflow from the GitHub Actions UI ("Run workflow"
  # button on the Nightly deep tests page), or via
  # `gh workflow run nightly.yml`. If the project reaches a stage where
  # background regression detection is load-bearing, re-enable the
  # `schedule:` trigger with a calibrated off-minute cron.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # fuzz (bridge-convergence.fuzz.test.ts) and stress
  # (server-authoritative-stress.test.ts) were removed from CI entirely on
  # 2026-04-19 per `specs/2026-04-19-ci-signal-quality/SPEC.md`. Their
  # architectural CRDT residual is intrinsic to the dual-CRDT topology
  # (D4-LOCKED until H2 2026+ per `specs/2026-04-16-bridge-correctness/`)
  # and mathematically guaranteed >80% PR-red rate. Ad-hoc sampling is
  # now handled by `bun run measure:fuzz` and `bun run measure:stress`
  # (see `packages/app/scripts/measure-*.sh`) with results appended to
  # `specs/2026-04-16-bridge-correctness/evidence/residual-measurements.jsonl`
  # — git history of that file is the trend record. No automated
  # regression detection (accepted cost per NG6 in the spec).

  # Tier-2 regression gates (R4 perf + R19 parse-health + US-015
  # parseWithFallback 5× bound). These gates are defined in `packages/core/`
  # but are not part of `bun run check` — so without an explicit nightly job
  # they would never run in CI. Matrix covers the three independent gate
  # targets; any single failure fails nightly but does not cascade.
  #
  # RUN_BENCH=1 is set at the job level. The perf:regression and perf:fallback
  # tasks require it to unlock their measured runs; test:health ignores it
  # (no consumer in the parse-health code path) — harmless to set uniformly.
  tier2-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        task:
          - test:perf:regression
          - test:health
          - test:perf:fallback
          - test:perf:r15-guard
    env:
      RUN_BENCH: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
      - run: bun install --frozen-lockfile
      - run: bunx turbo run ${{ matrix.task }}
