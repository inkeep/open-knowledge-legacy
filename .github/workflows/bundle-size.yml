name: Bundle Size

# Enforces SPEC A2 + §6 Cost budget: the four unified clipboard plugins
# (rehype-parse / rehype-remark / remark-rehype / rehype-stringify) plus
# any future additions must keep packages/app's bundle within the size
# budgets declared in packages/app/package.json's `size-limit` field.
#
# Regression gate: size-limit fails CI if ANY of the tracked artifacts
# (main JS, all-JS combined, main CSS) exceeds its gzipped limit.

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/app/**"
      - "packages/core/**"
      - "packages/server/**"
      - "bun.lock"
      - "package.json"
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  size:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Node 24 — same reason as the ci.yml `test` job: turbo's ^build
      # traverses into the app's vite build, which uses native `import()`
      # on workspace deps that resolve to `.ts` source.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"
      - run: bun install --frozen-lockfile
      - name: Check bundle size
        run: bun run --filter @inkeep/open-knowledge-app size
