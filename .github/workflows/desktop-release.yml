name: Desktop release

# M3 per specs/2026-04-21-m3-electron-updater/SPEC.md §5 AC5 + D8 + A5.
#
# Fires on `release: published` — emitted by `.github/workflows/release.yml`'s
# `gh release create` step, regardless of which token created the release
# (GITHUB_TOKEN or an App token). F14 audit resolved OQ2: the
# `release: published` trigger is more robust than `push.tags: ['v*']`
# because it does not depend on App-token-vs-GITHUB_TOKEN push semantics.
# It also eliminates the wait-for-release poll the tag-trigger variant
# would have required — the Release already exists by the time this
# workflow dispatches.
#
# What this workflow does: downloads the tagged ref, builds a signed +
# notarized + stapled + fuse-verified Universal DMG + Universal ZIP,
# and uploads `.dmg`, `.dmg.blockmap`, `.zip`, `.zip.blockmap`, and the
# channel-appropriate manifest (`latest-mac.yml` for stable releases,
# `beta-mac.yml` for `*-beta.*` prereleases) to the GitHub Release
# matching the tag. The channel is detected from the package version's
# prerelease tag in a step below; both manifests are uploaded under the
# `*-mac.yml` glob to the workflow audit artifact. The upload is
# driven by `electron-builder --publish always` reading the same
# `publish: [{ provider: github, owner: inkeep, repo: open-knowledge }]`
# block from `packages/desktop/electron-builder.yml` that the ad-hoc
# `desktop-build.yml` smoke uses; no separate `gh release upload` step.
#
# Required secrets (identical shape to desktop-build.yml § § §):
#   CSC_LINK / CSC_KEY_PASSWORD
#   APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
#     OR APPLE_API_KEY + APPLE_API_KEY_ID [+ APPLE_API_ISSUER]
#   GITHUB_TOKEN (auto-provided, contents:write scope) — used as GH_TOKEN
#     for electron-builder's GitHub publish.
#
# AC5 note: unsigned mode is explicitly REJECTED here. auto-update refuses
# unsigned upgrades (Squirrel.Mac signature-verifies every update against
# the installed app's cert), so publishing unsigned would silently break
# real-world update cycles. Without CSC_LINK present, this workflow fails
# loudly in the signmode-detection step rather than building an unpublishable
# artifact.
#
# Known deferrals (post-creds, per SPEC §6 + AC15/AC16):
#   - Real `v{X}` → `v{X+1}` silent upgrade on a fresh Mac
#   - Kill-updater-mid-download failure smoke against real notary service
# Both blocked on M2 FU-2 (Apple Developer Program creds) + M2 FU-1
# (@napi-rs/keyring universal-merge SHA-parity fix). This workflow file
# lints + parses at merge time; its execution path is gated on creds.

on:
  release:
    types: [published]
  # Manual re-publish path: lets us upload a DMG to an existing Release when
  # the original release-triggered run failed (e.g., a CI-only fix landed on
  # `main` after the tag was cut). Builds from the chosen `ref` (typically
  # `main` with the fix) and uploads to the Release matching `release_tag`.
  # The dispatcher must ensure `packages/desktop/package.json#version` at the
  # chosen ref matches `release_tag` (without the `v` prefix) — electron-builder
  # picks the upload target from package.json, not from this input.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload DMG to (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  # contents:write is required for electron-builder to upload release assets
  # via the GitHub API. The auto-provided GITHUB_TOKEN gets write scope with
  # this declaration; no separate PAT or App-token required.
  contents: write

# Concurrency mirrors desktop-build.yml's rationale — a mid-notarize cancel
# is costly (Apple's notary round-trip is 1-5 min and doesn't resume cleanly).
# Grouping on the release tag lets two back-to-back releases queue rather
# than race.
concurrency:
  group: desktop-release-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-publish-macos:
    # macos-26 = Apple Silicon (Tahoe) with Xcode 26.x preinstalled. Apple
    # Silicon is required for the Universal DMG lipo merge (arm64 + x64 →
    # universal) per parent SPEC D29. Xcode 26+ is required because
    # electron-builder compiles `build/okglass.icon` → `Assets.car` via
    # `actool`, which only ships with Xcode 26+.
    runs-on: macos-26
    # 45 min budget — same as desktop-build.yml. Signed builds add 2-5 min
    # of notary round-trip over the unsigned path; 45 min leaves headroom
    # for cold caches and notary queue spikes.
    timeout-minutes: 45
    steps:
      # On `release: published`, check out the tagged commit — `release.tag_name`
      # is the exact commit the Release was cut from, so the bundled version
      # + any CHANGELOG artifacts match the Release.
      #
      # On `workflow_dispatch`, check out the workflow ref the user dispatched
      # against (typically `main` with a CI fix). The dispatcher is responsible
      # for ensuring the resulting `packages/desktop/package.json#version`
      # matches `release_tag` (electron-builder uploads to the Release matching
      # package.json, not to `release_tag` directly).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-desktop-release-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-desktop-release-
            ${{ runner.os }}-turbo-desktop-

      - name: Install dependencies
        env:
          # Rebuild native modules against Electron's Node ABI — same as
          # desktop-build.yml.
          ELECTRON_SKIP_REBUILD: "0"
        run: bun install --frozen-lockfile

      # electron-builder.yml's `extraResources` rule copies from
      # `packages/cli/dist/public/`, which the CLI's `build:assets` populates
      # via `cp -r ../app/dist dist/public`. The CLI does not declare the
      # app as a workspace dep (app is private, and the CLI ships the
      # compiled bundle — not a package reference), so turbo's `^build`
      # runs them in parallel by default. Without explicit sequencing, cli's
      # `build:assets` races app's vite build and can fail (no `app/dist`
      # yet) or copy stale content. Use turbo's `--filter=@inkeep/...`
      # which DOES respect the `^build` graph (so server + core build
      # before app), and run the two filters in sequence to enforce
      # app → cli ordering.
      #
      # `bun run --filter=...` was the previous approach; it does not
      # honor turbo's dep graph (only runs the named package's `build`
      # script in isolation). After the workspace started shipping
      # `.mjs` builds for `@inkeep/open-knowledge-server` and
      # `@inkeep/open-knowledge-core` (specs/2026-04-24-desktop-packaging-
      # first-boot/), Vite's config loader in app-build resolves those
      # workspace deps via `exports.default → ./dist/index.mjs`. Without
      # an upstream `^build`, the `dist/` doesn't exist yet → "Failed to
      # resolve entry for package @inkeep/open-knowledge-server".
      - name: Build workspace (produces packages/cli/dist/public for extraResources)
        run: |
          bunx turbo run build --filter=@inkeep/open-knowledge-app
          bunx turbo run build --filter=@inkeep/open-knowledge

      - name: Detect signing mode
        id: signmode
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        # AC5 + SPEC §13 STOP_IF: unsigned mode is rejected. auto-update
        # refuses unsigned upgrades (signature verification by Squirrel.Mac
        # fails on cert mismatch), so publishing an unsigned DMG would
        # silently break the real-world update path. Fail loud instead.
        run: |
          if [[ -n "${CSC_LINK}" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing creds present — running signed build with electron-builder --publish always."
          else
            echo "::error::Cannot publish unsigned release — CSC_LINK is not set. auto-update requires signed DMGs."
            exit 1
          fi

      # Materialize App Store Connect API key (Option B notarization shape).
      # @electron/notarize's NotaryToolApiKeyCredentials types `appleApiKey`
      # as a filesystem path to the .p8 file — not the PEM contents. CI
      # runners have no .p8 on disk; the secret holds the key material.
      # Decode here and rewrite APPLE_API_KEY to point at the materialized
      # file. No-op when APPLE_API_KEY is unset (Option A password creds
      # path runs instead). Accepts either raw PEM or base64.
      - name: Materialize App Store Connect API key
        env:
          APPLE_API_KEY_VALUE: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [[ -z "$APPLE_API_KEY_VALUE" ]]; then
            echo "::notice::APPLE_API_KEY secret not set — Option A (APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID) path will run if those creds are present. afterSign.mjs fails loud on partial creds."
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          if [[ "$APPLE_API_KEY_VALUE" == *"BEGIN PRIVATE KEY"* ]] || [[ "$APPLE_API_KEY_VALUE" == *"BEGIN EC PRIVATE KEY"* ]]; then
            printf '%s' "$APPLE_API_KEY_VALUE" > "$KEY_PATH"
          else
            if ! printf '%s' "$APPLE_API_KEY_VALUE" | base64 -d > "$KEY_PATH" 2>/dev/null; then
              echo "::error::APPLE_API_KEY is neither a PEM nor valid base64. Re-export from App Store Connect → Users and Access → Integrations → Team Keys, then either paste the .p8 contents directly OR run 'base64 -i AuthKey_XXXX.p8 | pbcopy' and paste."
              exit 1
            fi
          fi
          if ! head -c 5 "$KEY_PATH" | grep -q "^-----"; then
            echo "::error::Materialized .p8 does not begin with '-----'. Secret was likely double-encoded or corrupted in transit."
            exit 1
          fi
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "::notice::APPLE_API_KEY materialized to $KEY_PATH"

      # Force-install both darwin-arm64 and darwin-x64 prebuilt binaries for
      # @napi-rs/keyring before electron-builder's universal merge runs. Bun
      # under workspace conditions only installs the host-arch optionalDependency
      # (cpu constraint), so the darwin-x64 binary is missing on an arm64
      # runner. @electron/universal's lipo merge then either errors or hangs
      # waiting for x64 inputs that don't exist.
      - name: Force-install darwin keyring prebuilds for universal merge
        working-directory: packages/desktop
        run: node scripts/prepare-universal.mjs

      # Detect channel from the release TAG (not package.json#version). For
      # auto-cadence beta releases, tag and package.json agree; for stable
      # promotions cut from a beta SHA via promote-stable.yml, tag is
      # `v0.4.0` while package.json still says `0.4.0-beta.N` (same SHA,
      # different version string in the binary). Tag is the source of truth
      # for which manifest the consumer expects.
      #
      # Maps the version's prerelease tag to electron-builder's
      # `--config.publish.channel` (writes beta-mac.yml vs latest-mac.yml)
      # and `--config.publish.releaseType` (sets the GitHub Release
      # `prerelease` flag). Also emits `version` for the
      # `--config.extraMetadata.version` override below — needed when
      # tag and package.json diverge so the DMG's `app.getVersion()`
      # matches the tag.
      #
      # Fail-fast on anything other than `-beta.*` or plain semver —
      # `-rc.*` / `-canary.*` etc. would ship a manifest with a channel
      # name that electron-updater's GitHub provider treats as exact-match-
      # only (no cascade walk), producing a release that can't be picked up
      # by any client subscribed to a recognized channel.
      - name: Detect channel from release tag
        id: channel
        env:
          # release:published carries event.release.tag_name; the
          # workflow_dispatch fallback supplies inputs.release_tag.
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG:-}" ]]; then
            echo "::error::No release tag available (neither github.event.release.tag_name nor inputs.release_tag is set). desktop-release.yml requires a tag to derive the version."
            exit 1
          fi
          # Strip leading `v` (electron-builder + npm want bare semver).
          VERSION="${RELEASE_TAG#v}"
          if [[ "$VERSION" == *-beta.* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "release_type=prerelease" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "::notice::Building BETA channel from tag $RELEASE_TAG"
          elif [[ "$VERSION" == *-beta ]]; then
            # The `*-beta.*` glob above requires a dot after `beta` (i.e.
            # `0.4.0-beta.0`, not `0.4.0-beta`). Trap the dotless form here
            # with a targeted message rather than letting it fall through
            # to the generic catch-all below — Changesets prerelease mode
            # always emits `-beta.N`, but a hand-edited tag could land here.
            echo "::error::Tag $RELEASE_TAG is missing the .N suffix — beta releases must be tagged -beta.N (e.g. -beta.0, -beta.1) so electron-updater's cascade walk can order them. See packages/desktop/README.md beta-channel runbook."
            exit 1
          elif [[ "$VERSION" == *-* ]]; then
            echo "::error::Unsupported prerelease ID in tag $RELEASE_TAG — only -beta.N is supported. See packages/desktop/README.md beta-channel runbook for the supported lifecycle."
            exit 1
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
            echo "release_type=release" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "::notice::Building LATEST channel from tag $RELEASE_TAG"
          fi

      - name: Build + sign + notarize + publish DMG/ZIP
        # electron-builder picks up CSC_LINK / CSC_KEY_PASSWORD from env +
        # signs. afterSign.mjs picks up APPLE_* + notarizes + staples +
        # fuse-verifies. `--publish always` makes electron-builder upload
        # the artifacts (.dmg, .dmg.blockmap, .zip, .zip.blockmap, and the
        # channel-appropriate manifest — `latest-mac.yml` or `beta-mac.yml`
        # depending on `--config.publish.channel` set below from the
        # detected channel) to the GitHub Release matching the current tag
        # — via the publish block in electron-builder.yml (A1) + GH_TOKEN
        # in env. No separate `gh release upload` step needed.
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_API_KEY itself is NOT set here — the materialize step above
          # writes the .p8 to disk and pushes APPLE_API_KEY=<path> into
          # $GITHUB_ENV so it flows through to this step. Setting it again
          # at step-level would override that path with the raw secret value
          # and break @electron/notarize's path-based contract.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # GH_TOKEN is what electron-builder's GitHub publisher reads.
          # The auto-provided GITHUB_TOKEN with contents:write scope
          # (declared above) is sufficient for uploading assets to a
          # Release that already exists (created by release.yml's
          # `gh release create`). F14 audit: no App-token required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/desktop
        run: |
          # extraMetadata.version override: when the tag is `v0.4.0` (stable
          # promotion) but package.json still has `0.4.0-beta.N` because
          # promote-stable.yml builds at the same SHA as the beta tag, the
          # override forces the DMG's app.getVersion() + the manifest's
          # `version` field to match the tag. For auto-cadence beta releases,
          # tag and package.json agree, so the override is a no-op.
          bun run build:desktop && bunx electron-builder --mac --publish always \
            --config.extraMetadata.version=${{ steps.channel.outputs.version }} \
            --config.publish.channel=${{ steps.channel.outputs.channel }} \
            --config.publish.releaseType=${{ steps.channel.outputs.release_type }}

      # Defense-in-depth: even though electron-builder --publish always
      # does the upload, upload the artifacts to the workflow's run log
      # too for a 14-day audit trail. Downstream consumers can download
      # the signed artifacts from either the Release itself or this
      # workflow artifact — useful when bisecting a botched upload.
      - name: Upload DMG/ZIP audit artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: open-knowledge-macos-release-${{ github.event.release.tag_name || inputs.release_tag }}
          path: |
            packages/desktop/dist-desktop/*.dmg
            packages/desktop/dist-desktop/*.dmg.blockmap
            packages/desktop/dist-desktop/*-mac.zip
            packages/desktop/dist-desktop/*-mac.zip.blockmap
            packages/desktop/dist-desktop/*-mac.yml
          retention-days: 14
          if-no-files-found: error
