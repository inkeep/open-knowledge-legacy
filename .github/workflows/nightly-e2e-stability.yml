name: Nightly E2E stability

# Tier 2 stability surveillance per US-029 / D-Q41 DIRECTED in
# specs/2026-04-17-e2e-observability-determinism/SPEC.md.
#
# Purpose: catch flakes that PR-time `failOnFlakyTests: true` doesn't —
# specifically, slow-burn drift where a test passes 99/100 but the 1%
# tail accumulates. PR-time CI runs each test once (or twice on retry);
# this nightly job runs the full Playwright suite with `--repeat-each=3`
# and `--workers=4`, exposing failure rates that single-shot CI would
# miss.
#
# On failure, opens a labeled GitHub issue (`e2e-flake`) with the failing
# test names + run URL so the team can triage without watching the
# scheduler. Issue creation requires the `e2e-flake` label to exist:
#   gh label create e2e-flake --color FBCA04 \
#     --description "Surfaced by Nightly E2E stability workflow"
# (one-time setup; safe to re-run).

on:
  schedule:
    # 09:00 UTC daily — coordinated NOT to collide with the existing
    # nightly.yml at 06:17 UTC. Off-cron-minute (00) chosen because the
    # spec text named "09:00 UTC" specifically.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  e2e-stability:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - id: playwright
        env:
          VITE_PORT: "13580"
        # Run the suite with `--repeat-each=3` to amplify any flake rate.
        # `--workers=4` matches PR-time concurrency from playwright.config.ts.
        # Run inside packages/app where playwright.config.ts lives.
        run: |
          cd packages/app
          bunx playwright test --repeat-each=3 --workers=4 --reporter=list
      - name: Upload nightly Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-playwright-report-${{ github.run_id }}
          path: packages/app/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload nightly test-results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-test-results-${{ github.run_id }}
          path: packages/app/test-results/
          retention-days: 14
          if-no-files-found: ignore
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Nightly E2E stability flake — run ${context.runId}`;
            const body = [
              `The Nightly E2E stability workflow failed under \`--repeat-each=3 --workers=4\`.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName}`,
              `**Branch:** ${context.ref}`,
              `**SHA:** \`${context.sha}\``,
              ``,
              `Download the \`nightly-test-results-${context.runId}\` artifact for traces / videos / screenshots, or view the HTML report at \`nightly-playwright-report-${context.runId}\`.`,
              ``,
              `Check the playwright job log for the specific failing test names. If the same test fails across multiple consecutive nights, promote it to a Linear bug; if isolated, monitor for one more cycle before escalating.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['e2e-flake'],
            });
