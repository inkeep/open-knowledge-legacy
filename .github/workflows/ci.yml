name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - run: bun install --frozen-lockfile
      # Registry drift check — fails if built-ins.ts or fumadocs-ui/docskit
      # were touched without regenerating packages/core/src/generated/components.ts
      - run: bun run drift-check
      # check = typecheck (turbo) + lint (biome) + test (turbo); build omitted per D3
      - run: bun run check
