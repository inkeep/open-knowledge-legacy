name: CI

# Tier 1 per SPEC §6 R9 (US-016). Runs the canonical `bun run check`
# composition (lint + typecheck + unit + integration + conversion + fidelity)
# plus opt-in coverage (fuzz + stress + Playwright) since those match what
# CLAUDE.md documents as the PR-time expectation. Budget: 15 min (p95 warm
# baseline ≈ 2m30s on local M3 Max; CI runners are ~2× slower; 1.5× headroom).
# Tier 2 (perf regression gate, parse-health gate, parseWithFallback 5× bound)
# runs in `nightly.yml`. Tier 3 (elevated-sample PBT + fuzz + perf trend)
# runs in `weekly.yml`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        task:
          - typecheck
          - test
          - test:integration
          - test:conversion
          - test:fidelity
          - test:stress:server-authoritative
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Node 22+ is required because turbo's `^build` pulls in
      # `open-knowledge-app#build` (vite build) transitively via the cli
      # package's workspace dep on the app. Vite's config loader evaluates
      # the bundled config with native `import()`, and externalized workspace
      # deps that resolve to `.ts` sources (e.g., `@inkeep/open-knowledge-server`
      # which exports `./src/index.ts`) hit Node's ESM loader. Node 20 throws
      # ERR_UNKNOWN_FILE_EXTENSION; Node 22.6+ strips TypeScript types natively.
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
      - run: bun install --frozen-lockfile
      - run: bunx turbo run ${{ matrix.task }}

  fuzz:
    # Shared large runner (16+ vCPU / 64 GB RAM) — mirrors the `playwright`
    # job pattern (PR #193). The bridge-convergence fuzzer runs seeds
    # serially and each seed boots a full Hocuspocus server + 2-3 clients,
    # so per-seed wall-clock time is CPU-dominated. On `ubuntu-latest`
    # (2-vCPU free tier) PR #192's initial 200-seed gate hit the 15-min
    # timeout at 14m56s (run 24577509123). The 64gb runner brings per-seed
    # time back in line with local M-series baseline (~2.75s/seed), so
    # 200 seeds × ~3s + install/cache ≈ 12 min, comfortably under budget.
    # See `packages/app/tests/stress/bridge-convergence.fuzz.test.ts`
    # `resolveSeedCount` for the per-tier seed-count calibration.
    runs-on: ubuntu-64gb
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-fuzz-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-fuzz-
      - run: bun install --frozen-lockfile
      # STRESS_FUZZ_PR=1 elevates the bridge-convergence fuzzer from 25
      # default seeds to the tier-1 PR target (see `resolveSeedCount`).
      # Nightly runs at 10000 via nightly.yml's explicit STRESS_FUZZ_NIGHTLY=1.
      - env:
          STRESS_FUZZ_PR: "1"
        run: bunx turbo run test:fuzz:bridge

  playwright:
    # Shared large runner (16+ vCPU / 64 GB RAM) — the 2-vCPU `ubuntu-latest`
    # free tier was the limiting factor for D-Q7: workers>1 × retries=2
    # oversubscribed the runner enough that runs cancelled at the 15-min
    # timeout (PR #193's first two CI runs). On `ubuntu-64gb` we can restore
    # workers=4 safely; see playwright.config.ts for the parallel config and
    # `specs/2026-04-17-e2e-observability-determinism/evidence/workers-calibration.md`
    # for the D-Q7 calibration history.
    runs-on: ubuntu-64gb
    # Chromium only — all E2E tests use programmatic clipboard injection
    # (dispatchEvent + synthetic ClipboardEvent), not real browser clipboard
    # APIs. Cross-browser differences are not exercised. See
    # playwright.config.ts comment for the full rationale.
    # Expected runtime on ubuntu-64gb: ~3-5 min at workers=4 + retries=2
    # (main baseline was 7m41s on 2-vCPU at retries=0 workers=default=1).
    # 15-min budget covers cold-start + retry tax + headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Node 22+ is required here because Vite's config loader writes the
      # bundled config to a .mjs file and evaluates it with native `import()`.
      # Any externalized workspace dep that resolves to a `.ts` source (e.g.,
      # `@inkeep/open-knowledge-server` which exports `./src/index.ts`) gets
      # hit by Node's ESM loader at that import. Node 20 throws
      #   ERR_UNKNOWN_FILE_EXTENSION
      # while Node 22.6+ strips TypeScript types natively and returns the
      # module cleanly. Ubuntu runners default to Node 20, so we upgrade
      # explicitly for the playwright job only.
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          # Partial cache hit on minor version bumps is preferable to a
          # full ~200MB re-download of Chromium every time bun.lock changes.
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: bun install --frozen-lockfile
      # Chromium only — all E2E tests use programmatic clipboard injection
      # (dispatchEvent + synthetic ClipboardEvent), not real browser clipboard
      # APIs. Cross-browser clipboard differences are not exercised. Running
      # webkit + firefox adds ~10 min CI time with zero additional coverage.
      # See playwright.config.ts comment for the full rationale.
      - run: bunx playwright install --with-deps chromium
      - env:
          VITE_PORT: "13579"
        run: bunx turbo run test:e2e
      # Always upload the HTML report (even on success) so any run can be
      # browsed; upload the raw test-results (traces, videos, screenshots)
      # only on failure to bound storage growth. Retention 14 days per D-Q6
      # LOCKED. `if: always()` on the upload steps so artifact upload failures
      # don't mask the test outcome (D-Q35).
      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.sha }}
          path: packages/app/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ github.sha }}
          path: packages/app/test-results/
          retention-days: 14
          if-no-files-found: ignore
