name: CI

on:
  push:
    branches: [main, feat/init-spike]
  pull_request:
    branches: [main, feat/init-spike]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true

      - name: Install all deps (workspaces)
        run: bun install --frozen-lockfile

      - name: Registry drift check
        run: bun run drift-check

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck (core)
        working-directory: packages/core
        run: bunx tsc --noEmit

      - name: Typecheck (server)
        working-directory: packages/server
        run: bunx tsc --noEmit

      - name: Typecheck (cli)
        working-directory: packages/cli
        run: bunx tsc --noEmit

      - name: Typecheck (app)
        working-directory: packages/app
        run: bunx tsc --noEmit

      - name: Typecheck (docs)
        working-directory: docs
        run: bun run typecheck

      - name: Test (all packages)
        run: bun test

      - name: Build (docs)
        working-directory: docs
        run: bun run build

      - name: Build (cli)
        working-directory: packages/cli
        run: bun run build
