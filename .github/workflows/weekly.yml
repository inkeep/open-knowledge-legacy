name: Weekly elevated-sample tests

# Tier 3 per SPEC §6 R9 (US-016). Runs the fidelity PBT suite at 10K samples
# (vs 1K on tier-2) and the bridge convergence fuzzer with elevated-seed mode
# enabled. Also produces a perf trend artifact — the benchmark harness JSON is
# uploaded so drift over weeks is reviewable post-hoc. Budget: 60 min (generous
# — elevated-sample runs are minutes, not sub-minute).
#
# Scheduled for Sunday mornings (off-minute). Manual trigger also supported so
# release branches can fire it on demand.

on:
  schedule:
    # 4:23 AM UTC Sundays (off-minute + off-hour to avoid GHA scheduling
    # contention; separated from nightly's 6:17 slot).
    - cron: "23 4 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Elevated-sample PBT: STRESS_FIDELITY=1 bumps fast-check numRuns from 1K to
  # 10K per `packages/app/tests/fidelity/helpers.ts` + PBT_TIMEOUT_MS from
  # 30s to 90s. Fidelity invariants I1-I10 plus the 6 new US-014 handler PBTs
  # run at elevated sample depth via `test:fidelity` (scoped to
  # `packages/app/tests/fidelity/**`). I11 (R23 guard precision, colocated
  # with the guard at `packages/core/src/markdown/autolink-void-html-guard.precision.test.ts`)
  # has its own STRESS_FIDELITY guard but is NOT re-run by this job — it
  # executes in the core unit suite at default sampling.
  elevated-fidelity:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-weekly-fidelity-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-weekly-fidelity-
      - run: bun install --frozen-lockfile
      - env:
          STRESS_FIDELITY: "1"
        run: bunx turbo run test:fidelity

  # Elevated-seed fuzz: STRESS_FUZZ_NIGHTLY=1 drives the bridge-convergence
  # fuzzer into its extended-sample mode.
  elevated-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-weekly-fuzz-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-weekly-fuzz-
      - run: bun install --frozen-lockfile
      - env:
          STRESS_FUZZ_NIGHTLY: "1"
        run: bunx turbo run test:fuzz:bridge

  # Perf trend: runs the full benchmark harness (tier-2 R4 also runs it, but
  # gates only on regression). The weekly job uploads the raw results JSON as
  # a workflow artifact so per-week drift at the tail is inspectable without
  # being a gating signal.
  perf-trend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: "1.3.11"
          cache: true
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-weekly-perf-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-weekly-perf-
      - run: bun install --frozen-lockfile
      - env:
          RUN_BENCH: "1"
        run: bunx turbo run test:perf:bench
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: perf-trend-${{ github.sha }}
          path: packages/core/tests/perf/results.*.json
          retention-days: 90
