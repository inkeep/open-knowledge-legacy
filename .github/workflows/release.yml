name: Release

# Release workflow on inkeep/open-knowledge-legacy. Single npm publisher
# for BOTH auto-cadence beta releases AND on-demand stable promotions.
#
# Both paths are repository_dispatch-driven. No `push` trigger: under the
# zero-commit-bump cadence, agents-private never commits a version bump,
# so a push to legacy/main can never carry a -beta.N suffix in
# packages/**/package.json. The version-bump-on-the-fly happens here via
# a transient `jq` override that lives only for the workflow run.
#
# Two dispatch types:
#
# 1. event_type=publish-beta (fired by
#    .github/workflows/public-open-knowledge-beta-cut.yml on agents-private
#    via cross-repo App token):
#      client_payload: { baseVersion: "X.Y.Z", maxBumpType: "patch"|"minor",
#                        releaseNotes: "<rendered markdown>" }
#    This workflow then:
#      - Resolves the -beta.N counter from the current state of
#        vX.Y.Z-beta.* tags on legacy (inside the ok-release-cadence
#        concurrency slot, so the counter is race-free across concurrent
#        dispatches).
#      - Overrides every fixed-group packages/*/package.json#version AND
#        packages/server/assets/skills/open-knowledge/SKILL.md
#        metadata.version to X.Y.Z-beta.N (transient jq, never committed).
#      - Tags vX.Y.Z-beta.N at the workflow checkout SHA + creates a
#        prerelease GitHub Release with the rendered notes.
#      - Publishes @inkeep/open-knowledge@X.Y.Z-beta.N to npm with
#        `--tag beta --provenance`.
#      - Re-points the `dev` dist-tag to the same version (fresh OIDC
#        exchange, npm CLI's TP session token is single-use).
#      - Dispatches desktop-release.yml so the signed DMG +
#        `beta-mac.yml` land on the prerelease.
#
# 2. event_type=publish-stable (fired by promote-stable.yml on this
#    same repo, once it has tagged vX.Y.Z + created the non-prerelease
#    GitHub Release):
#      client_payload: { ref: "vX.Y.Z", version: "X.Y.Z" }
#    This workflow:
#      - Checks out the stable tag (= the same SHA as the corresponding
#        beta tag).
#      - Overrides every fixed-group package.json#version to the clean
#        X.Y.Z (the legacy commit at that SHA still carries -beta.N from
#        a prior beta run's transient override — wait, no, that override
#        was never committed; the commit has whatever agents-private
#        mirrored, which is a `0.0.0` placeholder under the new cadence,
#        or some prior stable, depending on rollout state).
#      - Publishes @inkeep/open-knowledge@X.Y.Z to npm with
#        `--tag latest --provenance`.
#    promote-stable.yml separately fires its own `desktop-release`
#    dispatch so the stable DMG + `latest-mac.yml` land on the stable
#    Release.
#
# Why explicit `repository_dispatch` instead of relying on
# `release: published` to cascade: GitHub deliberately suppresses
# downstream workflow runs from GITHUB_TOKEN-authored events. The
# `gh release create` calls here and in promote-stable.yml use
# GITHUB_TOKEN, so `release: published` does NOT fire downstream.
# `repository_dispatch` and `workflow_dispatch` are the documented
# exemption to that rule and cascade even when fired via GITHUB_TOKEN.
#
# Why ONE workflow handles both: npm Trusted Publishing only allows ONE
# trusted publisher per package. Centralizing all `bun changeset
# publish` calls here means there is exactly one trusted-publisher
# entry on npmjs.com (workflow=release.yml). Both beta-cut and
# promote-stable route their npm publishes through here.
#
# Concurrency group is shared with promote-stable.yml so beta cuts and
# stable promotions never race on the same legacy state.

on:
  repository_dispatch:
    types: [publish-beta, publish-stable]

permissions:
  # contents: write — for beta path's git tag + Release creation.
  # id-token: write — for npm OIDC. Used both for provenance attestation
  #   (the SLSA Build L3 attestation surfaced to consumers) AND for npm
  #   Trusted Publishing — the OIDC token's repo + workflow claims
  #   authenticate the publish without an NPM_TOKEN secret. The trusted-
  #   publisher entry is configured on npmjs.com against
  #   inkeep/open-knowledge-legacy + this workflow filename. Only ONE
  #   entry per package; both beta-cut and promote-stable route through
  #   here to share this entry.
  # No packages: write — npm publishes go to npmjs.org, not GitHub
  #   Packages (ghcr.io / npm.pkg.github.com).
  contents: write
  id-token: write

concurrency:
  group: ok-release-cadence
  cancel-in-progress: false

jobs:
  release:
    name: Tag + publish (${{ github.event.action }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # publish-stable: the stable tag created by promote-stable.yml
          #   (= same SHA as the source beta tag).
          # publish-beta: no ref in payload — default to github.sha which,
          #   for a repository_dispatch, is the default branch's HEAD.
          ref: ${{ github.event.client_payload.ref || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Node for npm OIDC publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for OIDC + provenance
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version)"

      - name: Install
        run: bun install --frozen-lockfile

      # `bun changeset publish` invokes `npm publish` per package, which
      # in turn fires the cli's `prepublishOnly` (-> `bun run build`). The
      # cli's own build chain includes `cp -r ../app/dist dist/public`
      # which silently fails when the app hasn't been built first. Run a
      # top-level `bun run build` (turbo orchestrates the dep order:
      # app -> cli) so every package's dist/ exists before the publish
      # step runs.
      - name: Build packages
        run: bun run build

      # --- BETA DISPATCH PATH ---

      # Resolve the -beta.N counter inside this concurrency slot so
      # concurrent dispatches (e.g., three rapid changeset merges on
      # agents-private all firing beta-cut workflows) see different N's
      # and never collide on tag creation. agents-private's beta-cut
      # workflow intentionally sends only the base; N is decided here.
      - name: Resolve -beta.N counter (publish-beta)
        if: github.event.action == 'publish-beta'
        id: resolve-beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_VERSION: ${{ github.event.client_payload.baseVersion }}
        run: |
          set -euo pipefail
          if [[ -z "${BASE_VERSION:-}" ]]; then
            echo "::error::publish-beta dispatch missing client_payload.baseVersion"
            exit 1
          fi
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::publish-beta client_payload.baseVersion '${BASE_VERSION}' is not bare semver (X.Y.Z)"
            exit 1
          fi

          # Query existing v<BASE_VERSION>-beta.N tags on this repo and
          # find the max N. `git tag --list` only sees local tags; we
          # fetched them in the checkout step (fetch-depth: 0 pulls all
          # refs by default for actions/checkout@v6). Cross-check via
          # `gh api` for tags created by parallel runs that pushed to
          # origin since our checkout finished — the actual collision
          # window is between this step and the `git push origin TAG`
          # step below, which the concurrency group eliminates.
          MAX_N=-1
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if [[ "$tag" =~ ^v${BASE_VERSION//./\\.}-beta\.([0-9]+)$ ]]; then
              n="${BASH_REMATCH[1]}"
              if (( n > MAX_N )); then MAX_N="$n"; fi
            fi
          done < <(git tag --list "v${BASE_VERSION}-beta.*")

          NEXT_N=$((MAX_N + 1))
          VERSION="${BASE_VERSION}-beta.${NEXT_N}"
          TAG="v${VERSION}"
          echo "Existing max -beta.N for base ${BASE_VERSION}: ${MAX_N} -> emitting ${TAG}"

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Override fixed-group versions to X.Y.Z-beta.N (publish-beta)
        if: github.event.action == 'publish-beta'
        env:
          VERSION: ${{ steps.resolve-beta.outputs.version }}
        run: |
          set -euo pipefail
          # Same primitive as the publish-stable path: jq edits the
          # version field directly, never committed. The change lives
          # only for this workflow run and is discarded with the runner.
          # `npm version` would walk workspace deps and reject bun's
          # `workspace:*` protocol with EUNSUPPORTEDPROTOCOL — jq sidesteps.
          for pkg in cli core server app desktop; do
            f="packages/${pkg}/package.json"
            jq --arg v "$VERSION" '.version=$v' "$f" > "${f}.tmp"
            mv "${f}.tmp" "$f"
          done
          # SKILL.md's metadata.version "tracks @inkeep/open-knowledge-server
          # package version" — the build-time invariant test at
          # packages/server/src/build-skill-zip.ts asserts they match,
          # and packages/desktop/tests/main/install-skill-ipc.test.ts
          # asserts the built skill version equals current package version.
          # Mutate it in place (sed: same transient-only model as jq above).
          sed -i'.bak' -E "s/^([[:space:]]+version:[[:space:]]+\")[^\"]+(\".*)$/\1${VERSION}\2/" \
            packages/server/assets/skills/open-knowledge/SKILL.md
          rm -f packages/server/assets/skills/open-knowledge/SKILL.md.bak
          echo "All fixed-group package.json files + SKILL.md metadata.version now at ${VERSION} (in-memory only)."

      - name: Tag + create prerelease GitHub Release (publish-beta)
        if: github.event.action == 'publish-beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve-beta.outputs.tag }}
          NOTES: ${{ github.event.client_payload.releaseNotes }}
        run: |
          set -euo pipefail
          # Idempotency: a re-fire of this dispatch (manual recovery from
          # a flaky npm publish) should not explode on `git tag` already
          # exists. Within the concurrency slot, a tag-exists state only
          # arises on retry.
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally; skipping git tag step."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          BODY_FILE=$(mktemp)
          if [[ -n "${NOTES:-}" ]]; then
            printf '%s' "$NOTES" > "$BODY_FILE"
          else
            printf 'Auto-cadence beta release.\n' > "$BODY_FILE"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; updating notes."
            gh release edit "$TAG" --notes-file "$BODY_FILE"
          else
            gh release create "$TAG" \
              --prerelease \
              --title "$TAG" \
              --notes-file "$BODY_FILE"
          fi

      # The `gh release create` above runs as GITHUB_TOKEN, and GitHub
      # deliberately suppresses cascading workflow runs from
      # GITHUB_TOKEN-authored events to prevent recursion — so
      # `release: published` does NOT fire desktop-release.yml on its
      # own. The exemption to that rule is `repository_dispatch` (and
      # `workflow_dispatch`), which DO cascade even when fired via
      # GITHUB_TOKEN. Same-repo dispatch needs no PAT or App token —
      # the default `contents: write` token is enough.
      - name: Trigger desktop-release.yml to build + upload DMG (publish-beta)
        if: github.event.action == 'publish-beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve-beta.outputs.tag }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg tag "$TAG" \
            --arg ref "$TAG" \
            '{event_type: "desktop-release", client_payload: {release_tag: $tag, ref: $ref}}')
          gh api -X POST "repos/${GITHUB_REPOSITORY}/dispatches" --input - <<<"$payload"
          echo "Dispatched desktop-release for ${TAG}; desktop-release.yml will build the signed DMG and upload it + beta-mac.yml to the prerelease."

      # --- STABLE DISPATCH PATH ---

      - name: Validate stable_version + override package.json (publish-stable)
        if: github.event.action == 'publish-stable'
        env:
          STABLE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          if [[ -z "${STABLE_VERSION:-}" ]]; then
            echo "::error::publish-stable dispatch missing client_payload.version"
            exit 1
          fi
          if [[ ! "$STABLE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::publish-stable client_payload.version '${STABLE_VERSION}' is not bare semver (X.Y.Z)"
            exit 1
          fi

          # Same transient-jq primitive as the publish-beta path: edit
          # version fields in place, never commit. The legacy commit at
          # the source beta SHA carries whatever package.json version
          # agents-private mirrored (under the zero-commit-bump cadence,
          # that's the placeholder version on main); we override to the
          # clean X.Y.Z just for this publish.
          for pkg in cli core server app desktop; do
            f="packages/${pkg}/package.json"
            jq --arg v "$STABLE_VERSION" '.version=$v' "$f" > "${f}.tmp"
            mv "${f}.tmp" "$f"
          done
          # Match the beta path's SKILL.md sync so the published stable
          # carries a SKILL.md whose metadata.version reads X.Y.Z, not
          # whatever -beta.N was last stamped (or, in the steady state,
          # the placeholder).
          sed -i'.bak' -E "s/^([[:space:]]+version:[[:space:]]+\")[^\"]+(\".*)$/\1${STABLE_VERSION}\2/" \
            packages/server/assets/skills/open-knowledge/SKILL.md
          rm -f packages/server/assets/skills/open-knowledge/SKILL.md.bak
          echo "All fixed-group package.json files + SKILL.md metadata.version now at ${STABLE_VERSION} (in-memory only)."

      # --- SHARED PUBLISH STEP ---

      - name: Publish to npm via Trusted Publishing
        env:
          NPM_CONFIG_PROVENANCE: "true"
          ACTION: ${{ github.event.action }}
          BETA_VERSION: ${{ steps.resolve-beta.outputs.version }}
          STABLE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          # Auth via npm Trusted Publishing (OIDC). The id-token: write
          # permission lets npm CLI 11.5.1+ exchange the GitHub Actions
          # OIDC token for a short-lived npm token automatically — no
          # NPM_TOKEN secret, no ~/.npmrc auth write. The trusted-
          # publisher entry on npmjs.com matches the OIDC token's repo
          # (inkeep/open-knowledge-legacy) + workflow filename
          # (release.yml) claims. Provenance attestation also uses OIDC
          # (NPM_CONFIG_PROVENANCE). See
          # https://docs.npmjs.com/trusted-publishers.

          if [[ "$ACTION" == "publish-stable" ]]; then
            TAG=latest
            VERSION="$STABLE_VERSION"
            DO_DEV_ALIAS=false
          else
            TAG=beta
            VERSION="$BETA_VERSION"
            DO_DEV_ALIAS=true
          fi

          # Changesets reads .changeset/config.json from the repo root
          # and publishes every package in the fixed group. With
          # pre.json absent on legacy (Copybara excludes .changeset/),
          # Changesets treats this as a normal publish. Only
          # @inkeep/open-knowledge actually reaches the registry; the
          # four private:true packages are skipped by `changeset publish`.
          echo "Publishing with --tag ${TAG} (VERSION=${VERSION})"
          bun changeset publish --tag "$TAG"

          # Persist DO_DEV_ALIAS + VERSION for the next step. The
          # OIDC-acquired auth state from `bun changeset publish` does
          # NOT survive into a follow-up `npm dist-tag add` in the same
          # step (npm CLI's TP token is single-use, scoped to the
          # publish call), so the dev-alias has to mint its own token
          # in a dedicated step.
          {
            echo "DO_DEV_ALIAS=$DO_DEV_ALIAS"
            echo "DEV_ALIAS_VERSION=$VERSION"
          } >> "$GITHUB_ENV"

      # Alias the @dev dist-tag to the just-published beta version.
      # `npm publish` consumes the TP-acquired session token, so a
      # subsequent `npm dist-tag add` in the same shell hits E401.
      # Mint a fresh OIDC token here and exchange it via npm's TP
      # endpoint to get a new session token specifically for this
      # operation.
      #
      # Only @inkeep/open-knowledge (the CLI, packages/cli) is on the
      # registry — the four private:true fixed-group packages are
      # skipped, so this only acts on the CLI.
      - name: Alias @dev dist-tag (fresh OIDC exchange)
        if: github.event.action == 'publish-beta' && env.DO_DEV_ALIAS == 'true'
        run: |
          set -euo pipefail

          # Request a fresh GitHub Actions OIDC token with the npm
          # registry as audience. ACTIONS_ID_TOKEN_REQUEST_TOKEN +
          # ACTIONS_ID_TOKEN_REQUEST_URL are populated automatically
          # for any job with id-token: write permission.
          OIDC_TOKEN=$(curl -sSLf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | jq -r '.value')

          if [[ -z "$OIDC_TOKEN" || "$OIDC_TOKEN" == "null" ]]; then
            echo "::error::Failed to mint GitHub Actions OIDC token for npm audience"
            exit 1
          fi

          # Mask the OIDC JWT — short-lived (~5min) and audience-scoped
          # to npm, but exchangeable for an npm session token during its
          # validity window. Defense-in-depth against accidental leak via
          # `set -x`, future verbose curl flags, or a verbose error body.
          echo "::add-mask::${OIDC_TOKEN}"

          # Exchange the OIDC JWT with npm's trusted-publishing endpoint
          # for a session token usable on subsequent npm commands. The
          # endpoint is package-scoped (the returned token is only valid
          # for operations on that one package — fine here since we only
          # touch @inkeep/open-knowledge). The non-scoped path
          # `/oidc/token/exchange` (no `/package/...` suffix) returns 404.
          # https://api-docs.npmjs.com/#tag/registry.npmjs.org/operation/exchangeOidcToken
          NPM_TOKEN=$(curl -sSLf -X POST \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/%40inkeep%2Fopen-knowledge" \
            | jq -r '.token')

          if [[ -z "$NPM_TOKEN" || "$NPM_TOKEN" == "null" ]]; then
            echo "::error::npm OIDC token exchange returned no token"
            exit 1
          fi

          # Mask before any further use so it doesn't leak in logs.
          echo "::add-mask::${NPM_TOKEN}"

          # Write to ~/.npmrc so `npm dist-tag add` picks it up.
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "registry=https://registry.npmjs.org"
          } > "${HOME}/.npmrc"

          echo "Aliasing @inkeep/open-knowledge@${DEV_ALIAS_VERSION} as dev..."
          npm dist-tag add "@inkeep/open-knowledge@${DEV_ALIAS_VERSION}" dev

      - name: Restore working tree (defensive)
        # Both dispatch paths mutate package.json + SKILL.md transiently.
        # Make sure nothing leaks into git state — F10 of the spec.
        if: always()
        run: git restore . || true
