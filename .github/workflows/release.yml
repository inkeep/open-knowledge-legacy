name: Release

# Release workflow on inkeep/open-knowledge-legacy. Single npm publisher
# for both auto-cadence beta releases AND on-demand stable promotions.
#
# Two trigger paths:
#
# 1. push to main (auto-cadence beta):
#    Fires when a version-bump commit (mirrored from agents-private's
#    auto-merged "Version Packages (open-knowledge)" PR) lands. Detects
#    the new version on the canonical desktop package; if it carries a
#    -beta.* suffix, tags vX.Y.Z-beta.N at HEAD, creates a prerelease
#    GitHub Release, publishes npm with `--tag beta --provenance`,
#    aliases the `dev` dist-tag to the same version, and finally fires
#    `repository_dispatch` event_type=`desktop-release` so
#    desktop-release.yml builds the signed DMG and uploads it +
#    `beta-mac.yml` to the prerelease.
#
# 2. repository_dispatch (event_type: publish-stable):
#    Fired by promote-stable.yml on the same repo (legacy) once it has
#    tagged vX.Y.Z and created the non-prerelease GitHub Release.
#    Checks out the stable tag, transiently overrides package.json
#    versions to the clean stable string (the legacy commit at the beta
#    SHA still has -beta.N), then publishes npm with `--tag latest
#    --provenance`. promote-stable.yml separately fires its own
#    `desktop-release` dispatch so the stable DMG + `latest-mac.yml`
#    land on the stable Release.
#
# Why explicit `repository_dispatch` instead of relying on
# `release: published` to cascade: GitHub deliberately suppresses
# downstream workflow runs from GITHUB_TOKEN-authored events. The
# `gh release create` calls here and in promote-stable.yml use
# GITHUB_TOKEN, so `release: published` does NOT fire downstream.
# `repository_dispatch` and `workflow_dispatch` are the documented
# exemption to that rule and cascade even when fired via GITHUB_TOKEN.
#
# Why ONE workflow handles both: npm Trusted Publishing only allows ONE
# trusted publisher per package. Centralizing all `bun changeset
# publish` calls here means there is exactly one trusted-publisher
# entry on npmjs.com (workflow=release.yml). promote-stable.yml owns
# the tag + Release creation; this workflow owns npm.
#
# Concurrency group is shared with promote-stable.yml so beta cuts and
# stable promotions never race on the same legacy state.

on:
  push:
    branches: [main]
    paths:
      - "packages/**/package.json"
  repository_dispatch:
    types: [publish-stable]

permissions:
  # contents: write — for tags + Releases (push path)
  # id-token: write — for npm OIDC. Used both for provenance attestation
  #   (the SLSA Build L3 attestation surfaced to consumers) AND for npm
  #   Trusted Publishing — the OIDC token's repo + workflow claims
  #   authenticate the publish without an NPM_TOKEN secret. The trusted-
  #   publisher entry is configured on npmjs.com against
  #   inkeep/open-knowledge-legacy + this workflow filename. Only ONE
  #   entry per package; promote-stable.yml routes its publish through
  #   here via repository_dispatch to share this entry.
  # No packages: write — npm publishes go to npmjs.org, not GitHub
  #   Packages (ghcr.io / npm.pkg.github.com).
  contents: write
  id-token: write

concurrency:
  group: ok-release-cadence
  cancel-in-progress: false

jobs:
  release:
    name: Tag + publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Push path: HEAD on main (Copybara-mirrored version-bump commit).
          # Dispatch path: the stable tag created by promote-stable.yml,
          # which points at the same SHA as the corresponding beta tag.
          ref: ${{ github.event.client_payload.ref || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Node for npm OIDC publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for OIDC + provenance
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version)"

      - name: Install
        run: bun install --frozen-lockfile

      # `bun changeset publish` invokes `npm publish` per package, which in
      # turn fires the cli's `prepublishOnly` (-> `bun run build`). The cli's
      # own build chain includes `cp -r ../app/dist dist/public` which
      # silently fails when the app hasn't been built first. Run a top-level
      # `bun run build` (turbo orchestrates the dep order: app -> cli) so
      # every package's dist/ exists before the publish step runs.
      - name: Build packages
        run: bun run build

      # --- BETA PATH (push trigger) ---

      # Detect the channel by reading desktop's package.json#version (the
      # canonical fixed-group anchor). Compare against the parent commit
      # to skip dependency-only edits that didn't bump versions.
      - name: Detect channel (push path)
        if: github.event_name == 'push'
        id: detect
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(jq -r '.version' packages/desktop/package.json)
          PARENT_VERSION=$(git show HEAD~1:packages/desktop/package.json | jq -r '.version' 2>/dev/null || echo "")

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" == "$PARENT_VERSION" ]]; then
            echo "kind=none" >> "$GITHUB_OUTPUT"
            echo "Version unchanged from parent ($CURRENT_VERSION) — skipping release."
            exit 0
          fi

          if [[ "$CURRENT_VERSION" =~ -beta\.[0-9]+$ ]]; then
            echo "kind=beta" >> "$GITHUB_OUTPUT"
            echo "Detected beta release: $CURRENT_VERSION"
          elif [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Stable releases come through the repository_dispatch path
            # (fired by promote-stable.yml). A push-triggered run that
            # observes plain semver is unexpected — likely a hand-edit on
            # main bypassing the pipeline. Skip with a warning.
            echo "kind=none" >> "$GITHUB_OUTPUT"
            echo "::warning::Detected plain semver $CURRENT_VERSION on push path. Stable promotion runs via repository_dispatch from promote-stable.yml; skipping."
          else
            echo "kind=none" >> "$GITHUB_OUTPUT"
            echo "::warning::Unrecognized version pattern: $CURRENT_VERSION — skipping release."
          fi

      - name: Tag and create prerelease GitHub Release (beta path)
        if: github.event_name == 'push' && steps.detect.outputs.kind == 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.current }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          # Idempotency: a re-run after a transient failure should not
          # explode on `git tag` already exists. Skip the tag-create if
          # it's already there; still try to create the Release in case
          # the tag exists but the Release does not.
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping git tag step."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          # Build a release body from CHANGELOG entries for the new version.
          # Prefer desktop's CHANGELOG (fixed-group anchor); fall back to
          # cli's, then to a synthesized line if neither has an entry yet.
          BODY_FILE=$(mktemp)
          for changelog in packages/desktop/CHANGELOG.md packages/cli/CHANGELOG.md; do
            if [[ -f "$changelog" ]]; then
              awk -v ver="${VERSION}" '
                $0 ~ "^## " ver "([^[:digit:].]|$)" { capture=1; next }
                capture && /^## / { exit }
                capture { print }
              ' "$changelog" > "$BODY_FILE"
              if [[ -s "$BODY_FILE" ]]; then
                echo "Used CHANGELOG entries from $changelog"
                break
              fi
            fi
          done
          if [[ ! -s "$BODY_FILE" ]]; then
            printf 'Auto-cadence beta release.\n\nSee CHANGELOG.md per package for details.\n' > "$BODY_FILE"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; updating notes."
            gh release edit "$TAG" --notes-file "$BODY_FILE"
          else
            gh release create "$TAG" \
              --prerelease \
              --title "$TAG" \
              --notes-file "$BODY_FILE"
          fi

      # The `gh release create` above runs as GITHUB_TOKEN, and GitHub
      # deliberately suppresses cascading workflow runs from
      # GITHUB_TOKEN-authored events to prevent recursion — so
      # `release: published` does NOT fire desktop-release.yml on its
      # own. The exemption to that rule is `repository_dispatch` (and
      # `workflow_dispatch`), which DO cascade even when fired via
      # GITHUB_TOKEN. Same-repo dispatch needs no PAT or App token —
      # the default `contents: write` token is enough. promote-stable.yml
      # already uses this pattern to fire release.yml's dispatch path.
      - name: Trigger desktop-release.yml to build + upload DMG (beta path)
        if: github.event_name == 'push' && steps.detect.outputs.kind == 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.current }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          payload=$(jq -nc \
            --arg tag "$TAG" \
            --arg ref "$TAG" \
            '{event_type: "desktop-release", client_payload: {release_tag: $tag, ref: $ref}}')
          gh api -X POST "repos/${GITHUB_REPOSITORY}/dispatches" --input - <<<"$payload"
          echo "Dispatched desktop-release for ${TAG}; desktop-release.yml will build the signed DMG and upload it + beta-mac.yml to the prerelease."

      # --- STABLE PATH (repository_dispatch trigger) ---

      - name: Validate stable_version + override package.json (dispatch path)
        if: github.event_name == 'repository_dispatch'
        env:
          STABLE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          if [[ -z "${STABLE_VERSION:-}" ]]; then
            echo "::error::publish-stable dispatch missing client_payload.version"
            exit 1
          fi
          if [[ ! "$STABLE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::publish-stable client_payload.version '${STABLE_VERSION}' is not bare semver (X.Y.Z)"
            exit 1
          fi

          # The legacy commit at the beta SHA has package.json#version =
          # X.Y.Z-beta.N. We need to publish as X.Y.Z without a separate
          # commit (a real bump on legacy would conflict with the Copybara
          # mirror direction from agents-private). `npm version` with
          # --no-git-tag-version mutates package.json locally only; the
          # change lives for the workflow run and is restored at the end.
          for pkg in cli core server app desktop; do
            (cd "packages/${pkg}" && npm version "${STABLE_VERSION}" --no-git-tag-version --allow-same-version)
          done
          echo "All fixed-group package.json files now at ${STABLE_VERSION} (in-memory only)."

      # --- SHARED PUBLISH STEP ---

      - name: Publish to npm via Trusted Publishing
        if: (github.event_name == 'push' && steps.detect.outputs.kind == 'beta') || github.event_name == 'repository_dispatch'
        env:
          NPM_CONFIG_PROVENANCE: "true"
          PUSH_VERSION: ${{ steps.detect.outputs.current }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          # Auth via npm Trusted Publishing (OIDC). The id-token: write
          # permission lets npm CLI 11.5.1+ exchange the GitHub Actions
          # OIDC token for a short-lived npm token automatically — no
          # NPM_TOKEN secret, no ~/.npmrc auth write. The trusted-
          # publisher entry on npmjs.com matches the OIDC token's repo
          # (inkeep/open-knowledge-legacy) + workflow filename
          # (release.yml) claims. Provenance attestation also uses OIDC
          # (NPM_CONFIG_PROVENANCE). See
          # https://docs.npmjs.com/trusted-publishers.

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TAG=latest
            VERSION="$DISPATCH_VERSION"
            DO_DEV_ALIAS=false
          else
            TAG=beta
            VERSION="$PUSH_VERSION"
            DO_DEV_ALIAS=true
          fi

          # Changesets reads .changeset/config.json from the repo root and
          # publishes every package in the fixed group. With pre.json
          # absent on legacy (Copybara excludes .changeset/), Changesets
          # treats this as a normal publish. Only @inkeep/open-knowledge
          # actually reaches the registry; the four private:true packages
          # are skipped by `changeset publish`.
          echo "Publishing with --tag ${TAG} (VERSION=${VERSION})"
          bun changeset publish --tag "$TAG"

          # Persist DO_DEV_ALIAS + VERSION for the next step. The
          # OIDC-acquired auth state from `bun changeset publish` does
          # NOT survive into a follow-up `npm dist-tag add` in the same
          # step (npm CLI's TP token is single-use, scoped to the
          # publish call), so the dev-alias has to mint its own token
          # in a dedicated step.
          {
            echo "DO_DEV_ALIAS=$DO_DEV_ALIAS"
            echo "DEV_ALIAS_VERSION=$VERSION"
          } >> "$GITHUB_ENV"

      # Alias the @dev dist-tag to the just-published beta version.
      # `npm publish` consumes the TP-acquired session token, so a
      # subsequent `npm dist-tag add` in the same shell hits E401.
      # Mint a fresh OIDC token here and exchange it via npm's TP
      # endpoint to get a new session token specifically for this
      # operation.
      #
      # Only @inkeep/open-knowledge (the CLI, packages/cli) is on the
      # registry — the four private:true fixed-group packages are
      # skipped, so this only acts on the CLI.
      - name: Alias @dev dist-tag (fresh OIDC exchange)
        if: (github.event_name == 'push' && steps.detect.outputs.kind == 'beta') && env.DO_DEV_ALIAS == 'true'
        run: |
          set -euo pipefail

          # Request a fresh GitHub Actions OIDC token with the npm
          # registry as audience. ACTIONS_ID_TOKEN_REQUEST_TOKEN +
          # ACTIONS_ID_TOKEN_REQUEST_URL are populated automatically
          # for any job with id-token: write permission.
          OIDC_TOKEN=$(curl -sSLf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | jq -r '.value')

          if [[ -z "$OIDC_TOKEN" || "$OIDC_TOKEN" == "null" ]]; then
            echo "::error::Failed to mint GitHub Actions OIDC token for npm audience"
            exit 1
          fi

          # Mask the OIDC JWT — short-lived (~5min) and audience-scoped
          # to npm, but exchangeable for an npm session token during its
          # validity window. Defense-in-depth against accidental leak via
          # `set -x`, future verbose curl flags, or a verbose error body.
          echo "::add-mask::${OIDC_TOKEN}"

          # Exchange the OIDC JWT with npm's trusted-publishing
          # endpoint for a session token usable on subsequent npm
          # commands. The endpoint is what `npm publish` calls
          # internally for TP.
          NPM_TOKEN=$(curl -sSLf -X POST \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            https://registry.npmjs.org/-/npm/v1/oidc/token/exchange \
            | jq -r '.token')

          if [[ -z "$NPM_TOKEN" || "$NPM_TOKEN" == "null" ]]; then
            echo "::error::npm OIDC token exchange returned no token"
            exit 1
          fi

          # Mask before any further use so it doesn't leak in logs.
          echo "::add-mask::${NPM_TOKEN}"

          # Write to ~/.npmrc so `npm dist-tag add` picks it up.
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "registry=https://registry.npmjs.org"
          } > "${HOME}/.npmrc"

          echo "Aliasing @inkeep/open-knowledge@${DEV_ALIAS_VERSION} as dev..."
          npm dist-tag add "@inkeep/open-knowledge@${DEV_ALIAS_VERSION}" dev

      - name: Restore working tree (dispatch path; defensive)
        # The dispatch path mutates package.json transiently. Make sure
        # nothing leaks into git state — F10 of the spec.
        if: always() && github.event_name == 'repository_dispatch'
        run: git restore . || true
