name: Release

# Auto-cadence beta release on inkeep/open-knowledge-legacy.
#
# Fires on push-to-main when a version-bump commit (mirrored from
# agents-private's auto-merged "Version Packages (open-knowledge)" PR)
# lands. Detects the new version on the canonical desktop package; if
# it carries a -beta.* suffix, tags vX.Y.Z-beta.N at HEAD, creates a
# prerelease GitHub Release, publishes npm with `--tag beta
# --provenance`, and aliases the `dev` dist-tag to the same version.
# desktop-release.yml fires automatically on `release: published` and
# uploads the signed DMG.
#
# Stable releases come from promote-stable.yml (workflow_dispatch),
# not from this workflow. The plain-semver branch below is intentional
# defensive code so a future change that re-introduces direct-stable
# auto-cadence does not silently no-op.
#
# Concurrency group is shared with promote-stable.yml so beta cuts and
# stable promotions never race on the same legacy state.

on:
  push:
    branches: [main]
    paths:
      - "packages/**/package.json"

permissions:
  # contents: write — for tags + Releases
  # id-token: write — for npm OIDC. Used both for provenance attestation
  #   (the SLSA Build L3 attestation surfaced to consumers) AND for npm
  #   Trusted Publishing — the OIDC token's repo + workflow claims
  #   authenticate the publish without an NPM_TOKEN secret. The trusted-
  #   publisher entry is configured on npmjs.com against
  #   inkeep/open-knowledge-legacy + this workflow filename.
  # No packages: write — npm publishes go to npmjs.org, not GitHub
  #   Packages (ghcr.io / npm.pkg.github.com).
  contents: write
  id-token: write

concurrency:
  group: ok-release-cadence
  cancel-in-progress: false

jobs:
  release:
    name: Tag + publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Node for npm OIDC publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for OIDC + provenance
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version)"

      - name: Install
        run: bun install --frozen-lockfile

      # Detect the channel by reading desktop's package.json#version (the
      # canonical fixed-group anchor). Compare against the parent commit
      # to skip dependency-only edits that didn't bump versions.
      - name: Detect channel
        id: detect
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(jq -r '.version' packages/desktop/package.json)
          PARENT_VERSION=$(git show HEAD~1:packages/desktop/package.json | jq -r '.version' 2>/dev/null || echo "")

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" == "$PARENT_VERSION" ]]; then
            echo "kind=none" >> "$GITHUB_OUTPUT"
            echo "Version unchanged from parent ($CURRENT_VERSION) — skipping release."
            exit 0
          fi

          if [[ "$CURRENT_VERSION" =~ -beta\.[0-9]+$ ]]; then
            echo "kind=beta" >> "$GITHUB_OUTPUT"
            echo "Detected beta release: $CURRENT_VERSION"
          elif [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Stable releases are owned by promote-stable.yml. release.yml
            # auto-cadence stable would race against that workflow and
            # publish without the version-string override that stable
            # promotion needs. No-op intentionally.
            echo "kind=none" >> "$GITHUB_OUTPUT"
            echo "::warning::Detected plain semver $CURRENT_VERSION on auto-cadence path. Stable promotion runs in promote-stable.yml; skipping."
          else
            echo "kind=none" >> "$GITHUB_OUTPUT"
            echo "::warning::Unrecognized version pattern: $CURRENT_VERSION — skipping release."
          fi

      - name: Tag and create prerelease GitHub Release
        if: steps.detect.outputs.kind == 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.current }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          # Idempotency: a re-run after a transient failure should not
          # explode on `git tag` already exists. Skip the tag-create if
          # it's already there; still try to create the Release in case
          # the tag exists but the Release does not.
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping git tag step."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          # Build a release body from CHANGELOG entries for the new version.
          # Prefer desktop's CHANGELOG (fixed-group anchor); fall back to
          # cli's, then to a synthesized line if neither has an entry yet.
          BODY_FILE=$(mktemp)
          for changelog in packages/desktop/CHANGELOG.md packages/cli/CHANGELOG.md; do
            if [[ -f "$changelog" ]]; then
              awk -v ver="${VERSION}" '
                $0 ~ "^## " ver "([^[:digit:].]|$)" { capture=1; next }
                capture && /^## / { exit }
                capture { print }
              ' "$changelog" > "$BODY_FILE"
              if [[ -s "$BODY_FILE" ]]; then
                echo "Used CHANGELOG entries from $changelog"
                break
              fi
            fi
          done
          if [[ ! -s "$BODY_FILE" ]]; then
            printf 'Auto-cadence beta release.\n\nSee CHANGELOG.md per package for details.\n' > "$BODY_FILE"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; updating notes."
            gh release edit "$TAG" --notes-file "$BODY_FILE"
          else
            gh release create "$TAG" \
              --prerelease \
              --title "$TAG" \
              --notes-file "$BODY_FILE"
          fi

      - name: Publish to npm via Trusted Publishing + alias @dev
        if: steps.detect.outputs.kind == 'beta'
        env:
          NPM_CONFIG_PROVENANCE: "true"
          VERSION: ${{ steps.detect.outputs.current }}
        run: |
          set -euo pipefail
          # Auth via npm Trusted Publishing (OIDC). The id-token: write
          # permission lets npm CLI 11.5.1+ exchange the GitHub Actions
          # OIDC token for a short-lived npm token automatically — no
          # NPM_TOKEN secret, no ~/.npmrc auth write. The trusted-
          # publisher entry on npmjs.com matches the OIDC token's repo
          # (inkeep/open-knowledge-legacy) + workflow filename
          # (release.yml) claims; mismatched workflows are rejected.
          # Provenance attestation also uses OIDC (NPM_CONFIG_PROVENANCE).
          # See https://docs.npmjs.com/trusted-publishers.
          #
          # Changesets reads .changeset/config.json from the repo root and
          # publishes every package in the fixed group. With pre.json
          # absent on legacy (Copybara excludes .changeset/), Changesets
          # treats this as a normal publish. Only @inkeep/open-knowledge
          # actually reaches the registry; the four private:true packages
          # are skipped by `changeset publish`.
          bun changeset publish --tag beta

          # Alias the @dev dist-tag to the same version. Done in the SAME
          # step as publish so the OIDC-acquired auth state in ~/.npmrc
          # is still live (it does not persist across GitHub Actions steps;
          # each step is a fresh shell).
          #
          # Only @inkeep/open-knowledge (the CLI, packages/cli) is published.
          # The other four fixed-group packages are private:true and never
          # reach the registry, so npm dist-tag add for them returns 404
          # and aborts under set -e. If additional packages become public
          # later, add them with a registry-existence gate:
          #   npm view "${pkg}@${VERSION}" version 2>/dev/null && \
          #     npm dist-tag add "${pkg}@${VERSION}" dev
          #
          # `npm dist-tag add` takes a bare semver — the `v` prefix is for
          # git tags only.
          echo "Aliasing @inkeep/open-knowledge@${VERSION} as dev..."
          npm dist-tag add "@inkeep/open-knowledge@${VERSION}" dev
