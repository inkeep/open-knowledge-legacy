#
# Local LGTM observability stack for Open Knowledge dev.
# Grafana + Tempo + Loki + Prometheus + OTel Collector.
#
# Bring up:    docker compose -f docker/otel-dev/docker-compose.yml up -d
# Tear down:   docker compose -f docker/otel-dev/docker-compose.yml down
# Browse:      http://localhost:3001   (admin / anon; auth disabled for dev)
#
# Ports on the host:
#   3001 — Grafana UI         (3000 avoided — collides with Next.js dev server)
#   3100 — Loki HTTP          (direct Loki queries if needed)
#   3200 — Tempo HTTP         (direct Tempo queries if needed)
#   4317 — OTLP/gRPC in       (collector; configure app via OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317)
#   4318 — OTLP/HTTP in       (collector; configure app via OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318)
#   9090 — Prometheus UI
#   8889 — Collector's Prom-exporter (scrape target for prometheus.yml)
#
# The app + browser send OTLP to the collector. Collector fans out:
#   traces  → Tempo
#   logs    → Loki (native OTLP via /otlp endpoint — NOT the deprecated loki exporter)
#   metrics → Prometheus (scraped from the collector's Prometheus exporter)
#
services:
  grafana:
    image: grafana/grafana:11.4.0
    container_name: ok-otel-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceQLStreaming
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on: [tempo, loki, prometheus]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.0
    container_name: ok-otel-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: ok-otel-loki
    command: ["-config.file=/etc/loki-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: ok-otel-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage,native-histograms
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: ok-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP
      - "8889:8889"   # Prometheus scrape target
    depends_on: [tempo, loki, prometheus]
    restart: unless-stopped

volumes:
  grafana-data:
  tempo-data:
  loki-data:
  prom-data:
